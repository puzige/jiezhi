name: Jiezhi
options:
  bundleIdPrefix: com.puzige
  deploymentTarget:
    macOS: "12.3"
  xcodeVersion: "15.0"
settings:
  base:
    SWIFT_VERSION: 5.0
    MACOSX_DEPLOYMENT_TARGET: "12.3"
    CODE_SIGN_STYLE: Automatic
targets:
  Jiezhi:
    type: application
    platform: macOS
    sources:
      - Sources/App
      - Resources/Assets.xcassets
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleDisplayName: 止界
        CFBundleName: 止界
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSUIElement: true
        NSPrincipalClass: NSApplication
    entitlements:
      path: Sources/App/Jiezhi.entitlements
      properties:
        com.apple.security.app-sandbox: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.puzige.Jiezhi
        PRODUCT_NAME: 止界
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
schemes:
  Jiezhi:
    build:
      targets:
        Jiezhi: all
    run:
      config: Debug
    archive:
      config: Release
